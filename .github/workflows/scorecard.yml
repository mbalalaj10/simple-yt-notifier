# Simple YT Notifier - Security Scorecard workflow for running security checks on the repository
# Created on April 9th, 2026

name: Security Scorecard Action

on:
  workflow_dispatch:
  branch_protection_rule:
    types: [created, edited, deleted]
  schedule:
    # Runs every Saturday at 04:00 UTC
    - cron: "0 4 * * 6" 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    # Standard safeguard to prevent duplicate runs on PRs and pushes
    if: github.event.repository.default_branch == github.ref_name || github.event_name == 'pull_request'
    
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: SARIF File
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: results.sarif