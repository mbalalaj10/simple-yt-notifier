# Simple YT Notifier - Security Scorecard workflow for running security checks on the repository
# Created on April 9th, 2026

name: Security Scorecard Action

on:
  branch_protection_rule:
    types: [created, edited, deleted]
  schedule:
    # Runs every Saturday at 04:00 UTC
    - cron: "0 4 * * 6" 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    # Standard safeguard to prevent duplicate runs on PRs and pushes
    if: github.event.repository.default_branch == github.ref_name || github.event_name == 'pull_request'
    
    permissions:
      security-events: write
      id-token: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run Analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF File
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif